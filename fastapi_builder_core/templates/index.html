    <!DOCTYPE html>
    <html lang="ru">
    <head>
        <meta charset="UTF-8">
        <title>FastAPI Builder UI</title>
        <link href="{{ url_for('static', path='/style.css') }}" rel="stylesheet">
        <style>
            .checkbox-group { display: flex; gap: 20px; margin-bottom: 20px; background: #334155/30; padding: 10px; border-radius: 6px; border: 1px solid #475569; }
            .checkbox-group label { display: flex; align-items: center; gap: 8px; color: #fff; cursor: pointer; margin: 0; }
            .checkbox-group input[type="checkbox"] { width: auto; cursor: pointer; }
        </style>
    </head>
    <body>
        <div class="wrapper">
            <div class="container">
                <h1><span class="material-icons" style="color: #e11d48; font-size: 28px;">layers</span> FastAPI Эндпоинт Конструктор</h1>

                
                <div class="grid-2">
                    <div>
                        <label>Имя модуля (папки)</label>
                        <input id="module" type="text" placeholder="users" value="users" oninput="triggerPreview()">
                    </div>
                    <div>
                        <label>Краткое описание (Summary)</label>
                        <input id="summary" type="text" placeholder="Создать нового пользователя" oninput="triggerPreview()">
                    </div>
                </div>

                <div class="grid-3">
                    <div>
                        <label>Метод</label>
                        <select id="method" onchange="triggerPreview()">
                            <option>GET</option><option selected>POST</option><option>PUT</option><option>PATCH</option><option>DELETE</option>
                        </select>
                    </div>
                    <div>
                        <label>Путь (Path)</label>
                        <input id="path" type="text" placeholder="/create" value="/register" oninput="triggerPreview()">
                    </div>
                </div>

                <!-- БЛОК АВТОМАТИЗАЦИИ -->
                <div class="checkbox-group">
                    <label>
                        <input id="require_auth" type="checkbox" onchange="triggerPreview()"> 🔒 Требует авторизацию (JWT)
                    </label>
                    <label>
                        <input id="generate_tests" type="checkbox" onchange="triggerPreview()"> 🧪 Сгенерировать тесты (pytest)
                    </label>
                </div>


                <div style="margin-bottom: 20px;">
                    <h3 class="blue-t">Схема запроса (Request Body)</h3>
                    <div id="request-fields"></div>
                    <button onclick="addField('request-fields')" class="btn btn-blue">+ Добавить pole</button>
                </div>

                <div style="margin-bottom: 20px;">
                    <h3 class="purple-t">Схема ответа (Response Body)</h3>
                    <div id="response-fields"></div>
                    <button onclick="addField('response-fields')" class="btn btn-purple">+ Добавить pole</button>
                </div>
                <div style="margin-bottom: 20px;">
                    <label><span class="material-icons" style="font-size: 16px;">storage</span> Выберите Базу Данных</label>
                    <select id="db_type" onchange="triggerPreview()">
                        <option value="sqlite" selected>SQLite (Локальная / Быстрая)</option>
                        <option value="postgres">PostgreSQL (Асинхронная / Docker-ready)</option>
                    </select>
                </div>
                <button onclick="sendData()" class="btn btn-submit">Сгенерировать и сохранить файлы</button>
                <div id="result"></div>
            </div>

            <!-- ПРАВАЯ КОЛОНКА: Предпросмотр -->
            <div class="preview-container">
                <div class="tabs">
                    <button class="tab-btn active" onclick="switchTab('router-preview', this)">
                        <span class="material-icons">router</span> router.py
                    </button>
                    <button class="tab-btn" onclick="switchTab('schemas-preview', this)">
                        <span class="material-icons">schema</span> schemas.py
                    </button>
                    <button class="tab-btn" onclick="switchTab('models-preview', this)">
                        <span class="material-icons">storage</span> models.py (БД)
                    </button>
                    <button class="tab-btn" onclick="switchTab('tests-preview', this)">
                        <span class="material-icons">science</span> test_*.py (Pytest)
                    </button>
                </div>
                
                <!-- КРИТИЧЕСКИ ВАЖНО: У каждого блока должен быть класс code-block -->
                <div id="router-preview" class="code-block active">
                    <pre><code id="router-code"></code></pre>
                </div>
                <div id="schemas-preview" class="code-block">
                    <pre><code id="schemas-code"></code></pre>
                </div>
                <div id="models-preview" class="code-block">
                    <pre><code id="models-code"></code></pre>
                </div>
                <div id="tests-preview" class="code-block">
                    <pre><code id="test-code"># Включите флаг тестов для просмотра</code></pre>
                </div>
            </div>

    </div>

        <script>
            function addField(containerId) {
                const container = document.getElementById(containerId);
                const div = document.createElement('div');
                div.className = "field-row";
                div.innerHTML = `
                    <input type="text" placeholder="Имя поля" class="f-name" oninput="triggerPreview()">
                    <select class="f-type" onchange="triggerPreview()">
                        <option>str</option><option>int</option><option>float</option><option>bool</option>
                    </select>
                    <label><input type="checkbox" class="f-req" checked onchange="triggerPreview()"> Обяз.</label>
                    <button onclick="this.parentElement.remove(); triggerPreview();" class="btn-del">✕</button>
                `;
            container.appendChild(div);
            triggerPreview();
        }

        function collectFields(containerId) {
            const rows = document.getElementById(containerId).querySelectorAll('.field-row');
            return Array.from(rows).map(row => ({
                name: row.querySelector('.f-name').value,
                type: row.querySelector('.f-type').value,
                required: row.querySelector('.f-req').checked
            })).filter(f => f.name);
        }

        function getPayload() {
            return {
                module: document.getElementById('module').value || 'items',
                path: document.getElementById('path').value || '/',
                method: document.getElementById('method').value,
                summary: document.getElementById('summary').value || 'Эндпоинт',
                request_fields: collectFields('request-fields'),
                response_fields: collectFields('response-fields'),
                require_auth: document.getElementById('require_auth').checked,
                generate_tests: document.getElementById('generate_tests').checked,
                db_type: document.getElementById('db_type').value  
            };
        }


        async function triggerPreview() {
            const payload = getPayload();
            try {
                const res = await fetch('/api/preview', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                if (res.ok) {
                    const data = await res.json();
                    document.getElementById('router-code').innerText = data.router;
                    document.getElementById('schemas-code').innerText = data.schemas;
                    document.getElementById('models-code').innerText = data.models;
                    document.getElementById('test-code').innerText = data.tests;
                }
            } catch (error) {
                console.error(error);
            }
        }

        function switchTab(tabId, btn) {
            document.querySelectorAll('.code-block').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            btn.classList.add('active');
        }

        async function sendData() {
            const payload = getPayload();
            const resultDiv = document.getElementById('result');
            resultDiv.style.display = 'none';
            try {
                const res = await fetch('/api/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await res.json();
                resultDiv.style.display = 'block';
                if (res.ok) {
                    resultDiv.className = 'success';
                    resultDiv.innerText = "🚀 " + data.message;
                } else {
                    resultDiv.className = 'error';
                    resultDiv.innerText = "❌ Ошибка: " + data.detail;
                }
            } catch (error) {
                resultDiv.style.display = 'block';
                resultDiv.className = 'error';
                resultDiv.innerText = "💥 Ошибка сети.";
            }
        }
        triggerPreview();
    </script>
</body>
</html>
